version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-yourself-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: secure_yourself_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - secure-yourself-network

# // Сюда будут добавляться другие сервисы, такие как Redis, RabbitMQ и т.д.

volumes:
  postgres_data:
    driver: local

networks:
  secure-yourself-network:
    driver: bridge